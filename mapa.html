<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-white shadow flex justify-between items-center px-8 py-4">
    
    <a href="index.html" class="flex items-center space-x-2">
      <div class="bg-blue-700 p-2 rounded-lg text-white">💧</div>
      <h1 class="font-bold text-sm">Observatorio</h1>
    </a>

    <div class="space-x-4 text-sm">
      <a href="mapa.html" class="text-blue-600 font-semibold">Mapa</a>
      <a href="descripcion.html" class="text-gray-600">Reporte</a>
      <a href="perfil.html" class="text-gray-600">Perfil</a>
      <a href="index.html" class="text-red-500">Cerrar sesión</a>
    </div>

  </nav>

  <!-- TITULO -->
  <div class="p-6">
    <h2 class="text-2xl font-bold">Mapa de reportes</h2>
    <p class="text-gray-500">Visualiza los reportes en tu zona</p>
  </div>

  <!-- MAPA -->
  <div class="px-6">
    <div class="relative rounded-2xl overflow-hidden shadow" style="height: 500px; background: linear-gradient(135deg, #c8dde0 0%, #b8d4c8 40%, #c4dcc8 70%, #d0e4d0 100%);">

      <!-- GRID -->
      <svg class="absolute inset-0 w-full h-full">
        <defs>
          <pattern id="grid2" width="40" height="40">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid2)"/>
      </svg>

      <!-- MARCADORES -->
      <a href="detalle.html" class="absolute" style="left: 40%; top: 50%; transform: translate(-50%, -100%);">
        <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center">
          <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
      </a>

      <a href="detalle.html" class="absolute" style="left: 60%; top: 30%; transform: translate(-50%, -100%);">
        <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center">
          <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
      </a>

    </div>
  </div>

  <!-- BOTÓN + -->
  <div class="fixed bottom-6 right-6">
    <a href="descripcion.html">
      <button class="bg-blue-600 text-white text-2xl w-14 h-14 rounded-full shadow-lg">
        +
      </button>
    </a>
  </div>

</body>
</html>
