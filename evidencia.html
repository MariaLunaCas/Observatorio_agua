<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evidencia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-3xl">

    <!-- STEP BAR -->
    <div class="flex items-center justify-between mb-6 text-sm">

      <div class="flex items-center gap-2 text-gray-400">
        <div class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-300">1</div>
        <span>Descripción</span>
      </div>

      <div class="flex-1 h-px bg-gray-300 mx-2"></div>

      <div class="flex items-center gap-2 text-gray-400">
        <div class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-300">2</div>
        <span>Clasificación</span>
      </div>

      <div class="flex-1 h-px bg-gray-300 mx-2"></div>

      <div class="flex items-center gap-2 text-gray-400">
        <div class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-300">3</div>
        <span>Ubicación</span>
      </div>

      <div class="flex-1 h-px bg-gray-300 mx-2"></div>

      <div class="flex items-center gap-2 text-blue-600 font-semibold">
        <div class="w-8 h-8 flex items-center justify-center rounded-full bg-blue-600 text-white">4</div>
        <span>Evidencia</span>
      </div>

    </div>

    <!-- CARD -->
    <div class="bg-white p-8 rounded-2xl shadow-xl">

      <h1 class="text-2xl font-bold text-center mb-1">
        Sube evidencia fotográfica
      </h1>
      <p class="text-gray-400 text-center text-sm mb-6">
        Máximo 5 fotos. Se comprimen automáticamente
      </p>

      <!-- GALERÍA -->
      <div class="grid grid-cols-3 gap-4 mb-4">

        <!-- FOTO 1 -->
        <div class="relative bg-yellow-800 h-24 rounded-lg flex items-center justify-center text-white text-xl">
          🏭
          <button class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs">✕</button>
        </div>

        <!-- FOTO 2 -->
        <div class="relative bg-green-700 h-24 rounded-lg flex items-center justify-center text-white text-xl">
          🌊
          <button class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs">✕</button>
        </div>

        <!-- AGREGAR -->
        <div class="border-2 border-dashed border-gray-300 h-24 rounded-lg flex items-center justify-center text-3xl text-gray-400">
          +
        </div>

        <!-- VACÍOS -->
        <div class="border-2 border-dashed border-gray-200 h-24 rounded-lg flex items-center justify-center text-gray-300">
          +
        </div>

        <div class="border-2 border-dashed border-gray-200 h-24 rounded-lg flex items-center justify-center text-gray-300">
          +
        </div>

      </div>

      <p class="text-xs text-gray-400 mb-4 text-center">
        Fotos claras del punto de contaminación ayudan a la validación técnica
      </p>

      <!-- PROGRESO -->
      <div class="mb-6">
        <p class="text-sm font-semibold mb-1">Progreso de subida</p>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div class="bg-blue-600 h-2 rounded-full w-2/5"></div>
        </div>
        <p class="text-right text-xs text-gray-500 mt-1">2/5</p>
      </div>

      <!-- BOTONES -->
      <div class="flex justify-between gap-4">

        <!-- ANTERIOR -->
        <a href="ubicacion.html" class="w-1/2">
          <button class="w-full bg-gray-400 hover:bg-gray-600 text-white py-2 rounded-lg">
            Anterior
          </button>
        </a>

        <!-- FINALIZAR -->
        <a href="confirmacion.html" class="w-1/2">
          <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg">
            Finalizar 
          </button>
        </a>

      </div>

    </div>

  </div>

</body>
</html>
