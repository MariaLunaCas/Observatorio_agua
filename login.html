<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">

    <!-- VOLVER AL HOME -->
    <div class="text-left mb-4">
      <a href="index.html" class="text-blue-600 text-sm">
        ← Volver 
      </a>
    </div>

    <!-- ICONO -->
    <div class="mb-4 flex justify-center">
      <div class="bg-blue-800 p-4 rounded-xl">
        <span class="text-white text-2xl">💧</span>
      </div>
    </div>

    <!-- TITULO -->
    <h1 class="text-2xl font-bold mb-1">Bienvenido</h1>
    <p class="text-gray-500 text-sm mb-6">
      Observatorio ciudadano del agua
    </p>

    <!-- FORMULARIO -->
    <form class="space-y-4 text-left">

      <div>
        <label class="block text-sm font-medium">Correo electrónico</label>
        <input type="email" placeholder="usuario@email.com"
          class="w-full border p-2 rounded-lg">
      </div>

      <div>
        <label class="block text-sm font-medium">Contraseña</label>
        <input type="password"
          class="w-full border p-2 rounded-lg">
      </div>

      <!-- RECUPERAR CONTRASEÑA -->
      <div class="text-right">
        <a href="Recuperarcontraseña.html" class="text-sm text-blue-600">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <!-- BOTON LOGIN -->
      <button type="button"
        onclick="window.location.href='index.html'"
        class="w-full bg-blue-800 text-white py-2 rounded-lg hover:bg-blue-900">
        Iniciar sesión
      </button>

    </form>

    <!-- LINK REGISTRO -->
    <p class="text-sm mt-4">
      ¿No tienes cuenta?
      <a href="registro.html" class="text-blue-600 font-medium">
        Regístrate
      </a>
    </p>

  </div>

</body>
</html>
