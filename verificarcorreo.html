<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación de correo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

  <!-- CARD -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-gradient-to-r from-blue-800 to-cyan-500 text-white text-center py-6">
      <div class="text-3xl mb-2">💧</div>
      <h1 class="font-semibold">Observatorio del agua</h1>
    </div>

    <!-- CONTENIDO -->
    <div class="p-8 text-center">

      <!-- ICONO -->
      <div class="flex justify-center mb-4">
        <div class="bg-gray-200 p-4 rounded-full text-xl">
          ✉️
        </div>
      </div>

      <!-- TEXTO -->
      <h2 class="text-xl font-bold mb-2">¡Verifica tu correo!</h2>

      <p class="text-gray-500 text-sm mb-6">
        Hemos enviado un enlace de verificación a <br>
        <span class="font-medium">usuario@email.com</span>. <br>
        El enlace expira en 1 hora.
      </p>

      <!-- BOTÓN -->
      <a href="home_loggeado.html">
        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg flex items-center justify-center gap-2">
          ✔ Verificar mi email
        </button>
      </a>

      <!-- REENVIAR -->
      <p class="text-xs text-gray-500 mt-4">
        ¿No recibiste el correo?
        <a href="#" class="text-blue-600">Reenviar</a>
      </p>

    </div>

    <!-- FOOTER -->
    <div class="bg-gray-100 text-center text-xs text-gray-400 py-3">
      Si no solicitaste esto, ignora este mensaje. Observatorio Ciudadano del Agua
    </div>

  </div>

</body>
</html>
